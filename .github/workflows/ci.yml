name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: ci-secret-key-not-used-in-production
          DEBUG: "True"
          # DB_HOST intentionally blank → SQLite used (no DB service needed)
          DB_HOST: ""
        run: python manage.py test apps.accounts apps.notifications apps.borrowing apps.reservations apps.kits apps.incidents apps.equipment apps.consumables --verbosity=2
