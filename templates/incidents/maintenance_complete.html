{% extends 'base.html' %}
{% block title %}Complete Maintenance – SSELabTrack{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Complete Maintenance</h1>
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="space-y-4">
        {% for field in form %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<p class="mt-1 text-xs text-red-600">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
      </div>
      <div class="mt-6 flex gap-3">
        <button type="submit" class="px-5 py-2.5 bg-green-600 text-white text-sm font-medium rounded-lg hover:bg-green-700">Mark Complete</button>
        <a href="{% url 'incidents:maintenance_list' %}" class="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50">Cancel</a>
      </div>
    </form>
  </div>
</div>
<style>form input, form select, form textarea { width:100%; padding:0.5rem 0.75rem; border:1px solid #d1d5db; border-radius:0.5rem; font-size:0.875rem; } form textarea { min-height:60px; }</style>
{% endblock %}
