{% if breadcrumbs %}
<nav class="flex items-center mb-4" aria-label="Breadcrumb">
  <ol class="flex items-center gap-1 flex-wrap" role="list">
    <!-- Home always first -->
    <li class="flex items-center">
      <a href="{% url 'dashboard:home' %}"
         class="text-slate-400 hover:text-brand-600 transition-colors"
         aria-label="Home">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
      </a>
    </li>

    {% for crumb in breadcrumbs %}
    <!-- Separator -->
    <li class="flex items-center" aria-hidden="true">
      <svg class="w-3.5 h-3.5 text-slate-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </li>

    <!-- Crumb item -->
    <li class="flex items-center">
      {% if crumb.url and not forloop.last %}
        <a href="{{ crumb.url }}"
           class="text-sm text-slate-500 hover:text-brand-600 transition-colors font-medium truncate max-w-xs">
          {{ crumb.title }}
        </a>
      {% else %}
        <span class="text-sm text-slate-800 font-semibold truncate max-w-xs"
              aria-current="page">
          {{ crumb.title }}
        </span>
      {% endif %}
    </li>
    {% endfor %}
  </ol>
</nav>
{% endif %}
