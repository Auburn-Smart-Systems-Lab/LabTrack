{% if messages %}
<div id="messages-container" class="space-y-2 mb-4">
  {% for message in messages %}
  <div
    data-message-toast
    role="alert"
    class="flex items-start gap-3 px-4 py-3 rounded-xl shadow-sm border
      {% if message.tags == 'success' %}bg-green-50 border-green-200 text-green-800
      {% elif message.tags == 'error' or message.tags == 'danger' %}bg-red-50 border-red-200 text-red-800
      {% elif message.tags == 'warning' %}bg-yellow-50 border-yellow-200 text-yellow-800
      {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}
      transition-all duration-300 ease-in-out"
  >
    <!-- Icon -->
    <div class="flex-shrink-0 mt-0.5">
      {% if message.tags == 'success' %}
      <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {% elif message.tags == 'error' or message.tags == 'danger' %}
      <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {% elif message.tags == 'warning' %}
      <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
      {% else %}
      <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {% endif %}
    </div>

    <!-- Message text -->
    <p class="flex-1 text-sm font-medium leading-relaxed">{{ message }}</p>

    <!-- Dismiss button -->
    <button
      type="button"
      onclick="this.closest('[data-message-toast]').remove()"
      class="flex-shrink-0 ml-auto -mr-1 -mt-0.5 p-1 rounded-lg opacity-60 hover:opacity-100 transition-opacity focus:outline-none
        {% if message.tags == 'success' %}hover:bg-green-100
        {% elif message.tags == 'error' or message.tags == 'danger' %}hover:bg-red-100
        {% elif message.tags == 'warning' %}hover:bg-yellow-100
        {% else %}hover:bg-blue-100{% endif %}"
      aria-label="Dismiss"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  {% endfor %}
</div>

<script>
  (function () {
    // Auto-dismiss all toasts after 5 seconds
    document.querySelectorAll('[data-message-toast]').forEach(function (toast) {
      setTimeout(function () {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-8px)';
        toast.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        setTimeout(function () {
          toast.remove();
          // Remove container if empty
          var container = document.getElementById('messages-container');
          if (container && container.children.length === 0) {
            container.remove();
          }
        }, 400);
      }, 5000);
    });
  })();
</script>
{% endif %}
