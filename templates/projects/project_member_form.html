{% extends 'base.html' %}
{% block title %}Add Member – SSELabTrack{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 mb-2">Add Member</h1>
  <p class="text-sm text-gray-500 mb-6">Adding to project: <strong>{{ project.name }}</strong></p>
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="space-y-4">
        {% for field in form %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<p class="mt-1 text-xs text-red-600">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
      </div>
      <div class="mt-6 flex gap-3">
        <button type="submit" class="px-5 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700">Add Member</button>
        <a href="{% url 'projects:detail' project.pk %}" class="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50">Cancel</a>
      </div>
    </form>
  </div>
</div>
<style>form select { width:100%; padding:0.5rem 0.75rem; border:1px solid #d1d5db; border-radius:0.5rem; font-size:0.875rem; }</style>
{% endblock %}
