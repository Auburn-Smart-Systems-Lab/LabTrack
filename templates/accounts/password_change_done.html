{% extends 'base.html' %}
{% block title %}Password Changed – SSELabTrack{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 p-8 text-center space-y-4">
    <div class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mx-auto">
      <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-slate-900">Password updated</h1>
    <p class="text-sm text-slate-500">Your password has been changed successfully.</p>
    <a href="{% url 'accounts:profile' %}" class="inline-block px-5 py-2.5 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700">Back to Profile</a>
  </div>
</div>
{% endblock %}
